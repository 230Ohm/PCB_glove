<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="810" viewBox="0 0 250 135">
  <rect width="250" height="135" fill="#f7f8fa"/>
  <style>.t{font:3px sans-serif;fill:#17212b}.s{font:2.4px sans-serif;fill:#17212b}.h{font:bold 5px sans-serif;fill:#10243e}.board{fill:#eef7ef;stroke:#245c35;stroke-width:.7}.must{fill:#ef233c;fill-opacity:.22;stroke:#c1121f;stroke-width:.7}.svc{fill:#ffb703;fill-opacity:.24;stroke:#cc7a00;stroke-width:.6;stroke-dasharray:2 1}.future{fill:#8338ec;fill-opacity:.2;stroke:#6a00f4;stroke-width:.7;stroke-dasharray:1 1}.warn{font:bold 2.8px sans-serif;fill:#9b2226}</style>
  <text x="10" y="8" class="h">Proposal 015E — E4 cable-exit and bend-corridor map</text>
  <text x="10" y="12" class="warn">PROJECT ENGINEERING KEEP-OUT — NOT MANUFACTURER MAXIMUM</text>
  <rect x="10" y="15" width="150" height="110" rx="2" class="board"/>
  <!-- Mandatory USB corridors: 20mm project bend radius + 10mm straight strain transition -->
  <path d="M153 94 H188 A20 20 0 0 1 208 114 V125 H153 Z" class="must"/><text x="162" y="92" class="s">CN6 ST-LINK: +X; R20 min</text>
  <path d="M17 97 H-18 A20 20 0 0 0 -38 117 V125 H17 Z" class="must"/><text x="18" y="99" class="s">CN18 primary USB: -X; R20 min</text>
  <!-- Optional/removal-service cables -->
  <path d="M10 46 H-25 A20 20 0 0 0 -45 66 V78 H10 Z" class="svc"/><text x="12" y="48" class="s">CN16 Ethernet after removal</text>
  <path d="M40 120 V150 A20 20 0 0 0 60 170 H72 V120 Z" class="svc"/><text x="43" y="119" class="s">CN15 audio</text>
  <path d="M84 120 V148 H104 V120 Z" class="svc"/><text x="86" y="118" class="s">CN13 card path</text>
  <path d="M126 20 V-10 A20 20 0 0 1 146 -30 H158 V20 Z" class="svc"/><text x="129" y="25" class="s">CN4 STMod+</text>
  <path d="M155 107 H188 A20 20 0 0 1 208 127" class="svc" fill="none" stroke-width="8"/><text x="142" y="105" class="s">CN5 expansion</text>
  <path d="M17 31 V7 A20 20 0 0 0 -3 -13 H-18" class="svc" fill="none" stroke-width="8"/><text x="18" y="31" class="s">CN1 Tag-Connect ribbon</text>
  <!-- Reserved camera FFC corridor and service loop -->
  <path d="M54 20 V-14 A20 20 0 0 1 74 -34 H96 V20 Z" class="future"/><path d="M54 7 C35 -2 35 -22 54 -29 C73 -36 90 -25 88 -9" fill="none" stroke="#6a00f4" stroke-width="1.2"/>
  <text x="51" y="26" class="s">CN14 FFC: 30mm straight + R20 + service loop</text>
  <text x="166" y="18" class="h">Cable rule</text>
  <rect x="166" y="24" width="12" height="7" class="must"/><text x="181" y="29" class="t">installed access</text>
  <rect x="166" y="34" width="12" height="7" class="svc"/><text x="181" y="39" class="t">after removal</text>
  <rect x="166" y="44" width="12" height="7" class="future"/><text x="181" y="49" class="t">future reservation</text>
  <text x="166" y="60" class="t">Final cable OD is not yet</text><text x="166" y="64" class="t">selected. Every corridor uses</text><text x="166" y="68" class="t">R ≥ max(10×OD, 20mm),</text><text x="166" y="72" class="t">plus 10mm strain transition.</text>
  <text x="166" y="82" class="t">Corridors extend outside the</text><text x="166" y="86" class="t">150×110mm DK boundary and</text><text x="166" y="90" class="t">must remain free of enclosure,</text><text x="166" y="94" class="t">carrier, and interposer walls.</text>
  <text x="166" y="105" class="t">Camera: mechanical only.</text><text x="166" y="109" class="t">No electrical design authorized.</text>
</svg>
