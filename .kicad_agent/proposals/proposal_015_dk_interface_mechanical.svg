  <text x="30" y="34" class="title">Proposal 015D — MB1939 native-CAD geometry evidence</text>
  <rect x="30" y="49" width="1520" height="47" rx="5" class="warning"/>
  <text x="45" y="69" class="subtitle">DOCUMENTATION ONLY — NOT A PRODUCTION BOARD OUTLINE — NOT FOR FABRICATION</text>
  <text x="45" y="87" class="small">Nominal CAD geometry only. Maximum service, cable, tool, finger, tolerance, and assembled collision envelopes remain BLOCKED at Task B.</text>

  <rect x="20" y="112" width="500" height="448" rx="8" class="panel"/>
  <rect x="540" y="112" width="500" height="448" rx="8" class="panel"/>
  <rect x="1060" y="112" width="500" height="448" rx="8" class="panel"/>
  <text x="35" y="139" class="subtitle">TOP VIEW — native X direction</text>
  <text x="555" y="139" class="subtitle">DK BOTTOM VIEW — MIRRORED</text>
  <text x="1075" y="139" class="subtitle">MATING INTERPOSER VIEW — MIRRORED</text>
  <text x="35" y="157" class="tiny">Bottom connector bodies shown dashed through board</text>
  <text x="555" y="157" class="tiny">Looking at installed DK sockets from below</text>
  <text x="1075" y="157" class="tiny">Looking at future interposer's DK-facing side; no outline authorized</text>

  <!-- 3 px/mm; native datum at lower-left of each top-view coordinate frame. -->
  <g transform="translate(43 510) scale(3 -3)">
