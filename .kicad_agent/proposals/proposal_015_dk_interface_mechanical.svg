  <title id="title">MB1939 native-CAD geometry views for Proposal 015D</title>
  <desc id="desc">Documentation-only top, mirrored bottom, and mirrored mating-interposer views with native board outline, mounting holes, Arduino connector bodies, all pads, and physical pad 1.</desc>
