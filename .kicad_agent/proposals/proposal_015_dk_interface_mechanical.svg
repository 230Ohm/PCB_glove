  <text x="45" y="621" class="small">Native datum: ORIGINX 9964.0945 mil, ORIGINY 7346.2991 mil. Exact extrema: X −0.066419…150.063876 mm; Y −0.063894…110.068810 mm.</text>
  <text x="45" y="640" class="small">Connector body aggregate relative CN11 origin: X −2.578199…+50.838199 mm; Y −10.414104…+37.337936 mm. Red pads are native pad 1.</text>
  <text x="1010" y="600" class="small">Colors: CN7 blue; CN8 cyan; CN11 orange; CN12 yellow.</text>
  <text x="1010" y="621" class="small">Exact pads, holes, and 29 outline primitives are in companion CSV files.</text>
