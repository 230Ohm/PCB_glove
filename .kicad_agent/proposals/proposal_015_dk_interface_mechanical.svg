    .datum { stroke: #7323a5; stroke-width: 1.5; vector-effect: non-scaling-stroke; }
    .panel { fill: #fbfcfd; stroke: #c8d0d7; }
    .warning { fill: #fff1c9; stroke: #a65b00; }
    .gap { fill: #ffe4e4; stroke: #b12020; }
  </style>
