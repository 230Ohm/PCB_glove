<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="420" viewBox="0 0 1240 420">
  <style>.t{font:16px Arial,sans-serif;fill:#17202a}.h{font:bold 18px Arial,sans-serif}.b{fill:#eef6ff;stroke:#1f5f99;stroke-width:2}.g{fill:#eefaf1;stroke:#287a3b;stroke-width:2}.r{fill:#fff0f0;stroke:#a83232;stroke-width:2}.a{stroke:#333;stroke-width:2;fill:none;marker-end:url(#m)}.s{font:13px Arial,sans-serif;fill:#333}</style>
  <defs><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#333"/></marker></defs>
  <text x="30" y="35" class="h t">Proposal 015H — mandatory reset-safe startup sequence</text>
  <rect x="30" y="80" width="200" height="190" rx="12" class="r"/><text x="45" y="110" class="h t">State 0 — reset safe</text><text x="45" y="140" class="t">CS externally high</text><text x="45" y="165" class="t">GPIO analog / high-Z</text><text x="45" y="190" class="t">no SCK or MOSI</text><text x="45" y="215" class="t">INT high-Z; EXTI masked</text><text x="45" y="240" class="s">Actual board capture required</text>
  <rect x="280" y="80" width="200" height="190" rx="12" class="b"/><text x="295" y="110" class="h t">State 1 — own GPIO</text><text x="295" y="140" class="t">preload CS latches high</text><text x="295" y="165" class="t">then set output mode</text><text x="295" y="190" class="t">low slew / push-pull</text><text x="295" y="215" class="t">verify all five high</text>
  <rect x="530" y="80" width="200" height="190" rx="12" class="b"/><text x="545" y="110" class="h t">State 2 — own SPI5</text><text x="545" y="140" class="t">AF5, 4-wire, MSB first</text><text x="545" y="165" class="t">mode 3, software NSS</text><text x="545" y="190" class="t">100 kHz–1 MHz first</text><text x="545" y="215" class="t">CS stays high</text>
  <rect x="780" y="80" width="200" height="190" rx="12" class="b"/><text x="795" y="110" class="h t">State 3 — own INT</text><text x="795" y="140" class="t">input / no pull</text><text x="795" y="165" class="t">active-high source</text><text x="795" y="190" class="t">clear pending flags</text><text x="795" y="215" class="t">keep EXTI masked</text>
  <rect x="1030" y="80" width="180" height="190" rx="12" class="g"/><text x="1045" y="110" class="h t">State 4 — enable</text><text x="1045" y="140" class="t">rail valid + delay</text><text x="1045" y="165" class="t">all CS verified high</text><text x="1045" y="190" class="t">select one IMU</text><text x="1045" y="215" class="t">arm EXTI last</text>
  <path d="M230 175 H280" class="a"/><path d="M480 175 H530" class="a"/><path d="M730 175 H780" class="a"/><path d="M980 175 H1030" class="a"/>
  <path d="M1120 270 V340 H130 V270" class="a"/><text x="430" y="335" class="t">Any reset, fault, timeout, invalid rail, or identity failure → stop clocks, CS high, EXTI masked, return to State 0/1</text>
  <text x="30" y="395" class="s">Specification only — no firmware implementation or connector-level waveform capture was provided.</text>
</svg>
