<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="810" viewBox="0 0 250 135">
  <rect width="250" height="135" fill="#f7f8fa"/>
  <style>.t{font:3px sans-serif;fill:#17212b}.s{font:2.4px sans-serif;fill:#17212b}.h{font:bold 5px sans-serif;fill:#10243e}.board{fill:#eef7ef;stroke:#245c35;stroke-width:.7}.finger{fill:#ffcad4;fill-opacity:.65;stroke:#c9184a;stroke-width:.55}.tool{fill:#bee1e6;fill-opacity:.55;stroke:#0077b6;stroke-width:.55}.fast{fill:none;stroke:#6c757d;stroke-width:.65;stroke-dasharray:2 1}.warn{font:bold 2.8px sans-serif;fill:#9b2226}</style>
  <text x="10" y="8" class="h">Proposal 015E — E5 finger and E6 tool/probe access map</text>
  <text x="10" y="12" class="warn">PROJECT ENGINEERING KEEP-OUT — NOT MANUFACTURER MAXIMUM</text>
  <rect x="10" y="15" width="150" height="110" rx="2" class="board"/>
  <!-- 12mm finger contact regions, 15mm unobstructed vertical approach -->
  <circle cx="154.27" cy="69.88" r="6" class="finger"/><text x="146" y="70" class="s">B1 RESET</text>
  <circle cx="154.27" cy="57.18" r="6" class="finger"/><text x="147" y="57" class="s">B2</text>
  <circle cx="154.27" cy="44.48" r="6" class="finger"/><text x="147" y="44" class="s">B4</text>
  <rect x="149.5" y="29" width="10" height="15" rx="2" class="tool"/><text x="140" y="36" class="s">SW1/SW2 10mm width</text>
  <circle cx="158" cy="94" r="6" class="finger"/><text x="142" y="88" class="s">CN6 grip</text>
  <circle cx="17" cy="97" r="6" class="finger"/><text x="19" y="96" class="s">CN18 grip</text>
  <circle cx="10" cy="46" r="6" class="finger"/><text x="17" y="46" class="s">CN16 latch</text>
  <circle cx="64" cy="20" r="6" class="finger"/><text x="66" y="20" class="s">CN14 latch</text>
  <rect x="5" y="20" width="20" height="20" class="tool"/><text x="7" y="31" class="s">CN1 probe/clip</text>
  <circle cx="127" cy="119" r="10" class="tool"/><text x="119" y="116" class="s">JP1</text>
  <circle cx="118" cy="119" r="10" class="tool"/><text x="111" y="124" class="s">JP2</text>
  <rect x="76" y="112" width="16" height="13" class="tool"/><text x="78" y="119" class="s">CN13 8mm</text>
  <!-- 12/14mm fastener driver cylinders at all native mounting holes -->
  <circle cx="15.08" cy="119.92" r="6" class="fast"/><circle cx="15.08" cy="20.08" r="6" class="fast"/>
  <circle cx="154.92" cy="119.92" r="6" class="fast"/><circle cx="154.92" cy="20.08" r="6" class="fast"/>
  <circle cx="26.76" cy="118.82" r="7" class="fast"/><circle cx="26.76" cy="33.28" r="7" class="fast"/>
  <circle cx="143.24" cy="118.82" r="7" class="fast"/><circle cx="143.24" cy="33.28" r="7" class="fast"/>
  <text x="166" y="18" class="h">Access rules</text>
  <circle cx="172" cy="28" r="6" class="finger"/><text x="181" y="29" class="t">E5 finger Ø12×15 high</text>
  <rect x="166" y="38" width="12" height="8" class="tool"/><text x="181" y="43" class="t">E6 tool/probe region</text>
  <circle cx="172" cy="55" r="6" class="fast"/><text x="181" y="56" class="t">fastener driver Ø12</text>
  <circle cx="172" cy="68" r="7" class="fast"/><text x="181" y="69" class="t">fastener driver Ø14</text>
  <text x="166" y="80" class="t">Fastener tool approach:</text><text x="166" y="84" class="t">25mm straight +/-Z.</text>
  <text x="166" y="92" class="t">JP1/JP2: 2.5mm side grip,</text><text x="166" y="96" class="t">15mm removal, 20mm high</text><text x="166" y="100" class="t">unobstructed approach.</text>
  <text x="166" y="110" class="t">Top controls remain reachable</text><text x="166" y="114" class="t">from +Z; bottom service items</text><text x="166" y="118" class="t">may require interposer removal</text><text x="166" y="122" class="t">as classified in the CSV.</text>
</svg>
