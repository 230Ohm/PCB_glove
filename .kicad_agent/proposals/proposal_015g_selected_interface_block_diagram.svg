  <rect x="630" y="365" width="190" height="72" rx="8" class="conn"/><text x="725" y="395" text-anchor="middle" class="label">JH_CS — 6 pos</text><text x="725" y="419" text-anchor="middle" class="small">CS1/G/CS2/CS3/CS4/CS5</text>
  <rect x="630" y="465" width="190" height="72" rx="8" class="conn"/><text x="725" y="495" text-anchor="middle" class="label">JH_INT — 6 pos</text><text x="725" y="519" text-anchor="middle" class="small">INT1/G/INT2/INT3/INT4/INT5</text>
  <text x="725" y="575" text-anchor="middle" class="small">Molex 5055700601 + 5055721200</text>
  <text x="725" y="597" text-anchor="middle" class="small">provisional max length: 100 mm</text>

  <rect x="925" y="205" width="190" height="380" rx="18" class="box"/>
