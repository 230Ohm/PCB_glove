  <rect x="960" y="420" width="120" height="45" class="conn"/><text x="1020" y="448" text-anchor="middle" class="small">CS links</text>
  <rect x="960" y="490" width="120" height="45" class="conn"/><text x="1020" y="518" text-anchor="middle" class="small">INT links</text>
  <path d="M860 400 L925 400" class="wire"/>

  <rect x="1180" y="245" width="180" height="260" rx="18" class="glove"/>
  <text x="1270" y="282" text-anchor="middle" class="label">PCB_glove</text>
  <text x="1270" y="310" text-anchor="middle" class="small">future exact headers:</text>
  <text x="1270" y="336" text-anchor="middle" class="small">5055750620 x3</text>
  <text x="1270" y="372" text-anchor="middle" class="small">logic + shared GND only</text>
  <text x="1270" y="412" text-anchor="middle" class="small">+3V3_IMU from local U2</text>
  <text x="1270" y="438" text-anchor="middle" class="small">fed by external J9 path</text>
  <path d="M1115 400 L1180 400" class="wire"/>

  <rect x="1010" y="665" width="350" height="100" rx="12" class="danger"/>
  <text x="1185" y="700" text-anchor="middle" class="red">DK +5V / +3V3 / VIN / IOREF</text>
  <text x="1185" y="728" text-anchor="middle" class="red">NO CONDUCTOR — NO COPPER — NO TEST POINT</text>
  <text x="1185" y="750" text-anchor="middle" class="small">PCB_glove positive power enters through external J9 only</text>
  <text x="45" y="790" class="red">RIGID FOUR-HEADER INTERPOSER — TASK E BLOCKED. Maximum simultaneous rigid DK mates in selected architecture: one.</text>
