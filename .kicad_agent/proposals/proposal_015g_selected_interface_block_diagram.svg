  <rect width="1400" height="820" fill="white"/>
  <text x="40" y="46" class="title">Proposal 015G — selected controlled-development DK interface</text>
  <text x="40" y="76" class="sub">Four independently supported breakout sections; short 26 AWG harness; three keyed 6-position groups; no KiCad implementation authorized</text>

  <rect x="45" y="120" width="250" height="520" rx="18" class="dk"/>
  <text x="85" y="158" class="label">STM32N6570-DK</text>
  <text x="75" y="184" class="small">MB1939 bottom mating face</text>
  <rect x="90" y="220" width="150" height="62" rx="8" class="box"/><text x="150" y="250" text-anchor="middle" class="label">CN7</text><text x="150" y="271" text-anchor="middle" class="small">INT5 only</text>
  <rect x="90" y="310" width="150" height="78" rx="8" class="box"/><text x="150" y="340" text-anchor="middle" class="label">CN8</text><text x="150" y="362" text-anchor="middle" class="small">GND x2 only</text><text x="150" y="382" text-anchor="middle" class="red">POWER DNC</text>
  <rect x="90" y="416" width="150" height="62" rx="8" class="box"/><text x="150" y="446" text-anchor="middle" class="label">CN11</text><text x="150" y="467" text-anchor="middle" class="small">CS4-5; INT1-4</text>
  <rect x="90" y="506" width="150" height="62" rx="8" class="box"/><text x="150" y="536" text-anchor="middle" class="label">CN12</text><text x="150" y="557" text-anchor="middle" class="small">SPI; CS1-3; GND</text>
  <text x="70" y="608" class="small">DK mounted to carrier at holes</text>

  <rect x="355" y="205" width="170" height="76" rx="10" class="bo"/><text x="440" y="236" text-anchor="middle" class="label">CN7 breakout</text><text x="440" y="260" text-anchor="middle" class="small">1 rigid mate</text>
  <rect x="355" y="307" width="170" height="82" rx="10" class="bo"/><text x="440" y="338" text-anchor="middle" class="label">CN8 breakout</text><text x="440" y="362" text-anchor="middle" class="small">GND fan-out only</text><text x="440" y="382" text-anchor="middle" class="red">rails isolated</text>
  <rect x="355" y="413" width="170" height="76" rx="10" class="bo"/><text x="440" y="444" text-anchor="middle" class="label">CN11 breakout</text><text x="440" y="468" text-anchor="middle" class="small">1 rigid mate</text>
  <rect x="355" y="512" width="170" height="76" rx="10" class="bo"/><text x="440" y="543" text-anchor="middle" class="label">CN12 breakout</text><text x="440" y="567" text-anchor="middle" class="small">1 rigid mate</text>

  <path d="M240 250 L355 243" class="wire"/><path d="M240 350 L355 348" class="wire"/><path d="M240 448 L355 451" class="wire"/><path d="M240 538 L355 550" class="wire"/>

