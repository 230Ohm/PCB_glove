<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      .title{font:700 28px sans-serif;fill:#0f172a}.sub{font:16px sans-serif;fill:#334155}.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.dk{fill:#e0f2fe;stroke:#0369a1;stroke-width:3}.bo{fill:#ecfccb;stroke:#4d7c0f;stroke-width:2}.conn{fill:#fef3c7;stroke:#b45309;stroke-width:2}.glove{fill:#ede9fe;stroke:#6d28d9;stroke-width:3}.danger{fill:#fee2e2;stroke:#b91c1c;stroke-width:3}.wire{stroke:#334155;stroke-width:4;fill:none;marker-end:url(#arrow)}.ground{stroke:#0f766e;stroke-width:5;fill:none}.red{font:700 16px sans-serif;fill:#b91c1c}.small{font:14px sans-serif;fill:#334155}.label{font:700 17px sans-serif;fill:#0f172a}
    </style>
