<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs><style>.t{font:700 28px sans-serif;fill:#0f172a}.h{font:700 18px sans-serif;fill:#0f172a}.s{font:15px sans-serif;fill:#334155}.red{font:700 17px sans-serif;fill:#b91c1c}.b{fill:#f8fafc;stroke:#334155;stroke-width:2}.r{fill:#fee2e2;stroke:#b91c1c;stroke-width:3}.g{fill:#d1fae5;stroke:#047857;stroke-width:3}.p{fill:#ede9fe;stroke:#6d28d9;stroke-width:3}.line{stroke:#334155;stroke-width:3}.cut{stroke:#b91c1c;stroke-width:8;stroke-dasharray:12 8}</style></defs>
  <rect width="1400" height="820" fill="white"/>
  <text x="40" y="48" class="t">Proposal 015G — positive-power isolation proof</text>
  <text x="40" y="78" class="s">Electrical classification is fixed by official MB1939 pin progression; view is functional, not a footprint drawing.</text>
  <rect x="55" y="130" width="340" height="555" rx="18" class="b"/><text x="225" y="168" text-anchor="middle" class="h">MB1939 CN8</text>
  <g class="s">
    <rect x="95" y="195" width="260" height="42" class="b"/><text x="115" y="222">1  NC — DNC</text>
    <rect x="95" y="250" width="260" height="42" class="r"/><text x="115" y="277" class="red">2  IOREF — POWER DNC</text>
    <rect x="95" y="305" width="260" height="42" class="b"/><text x="115" y="332">3  RESET — DNC</text>
    <rect x="95" y="360" width="260" height="42" class="r"/><text x="115" y="387" class="red">4  +3V3 — POWER DNC</text>
    <rect x="95" y="415" width="260" height="42" class="r"/><text x="115" y="442" class="red">5  +5V — POWER DNC</text>
    <rect x="95" y="470" width="260" height="42" class="g"/><text x="115" y="497">6  GND — USED</text>
    <rect x="95" y="525" width="260" height="42" class="g"/><text x="115" y="552">7  GND — USED</text>
    <rect x="95" y="580" width="260" height="42" class="r"/><text x="115" y="607" class="red">8  VIN — POWER DNC</text>
  </g>
  <text x="225" y="654" text-anchor="middle" class="s">Exact Amphenol header is fully populated.</text>
  <text x="225" y="676" text-anchor="middle" class="s">DNC tails pass only through isolated NPTH.</text>

  <rect x="515" y="180" width="330" height="420" rx="18" class="b"/><text x="680" y="220" text-anchor="middle" class="h">CN8 breakout section</text>
  <rect x="570" y="270" width="220" height="70" rx="8" class="r"/><text x="680" y="300" text-anchor="middle" class="red">Pins 2 / 4 / 5 / 8</text><text x="680" y="324" text-anchor="middle" class="red">ISOLATED NPTH ONLY</text>
  <rect x="570" y="380" width="220" height="80" rx="8" class="g"/><text x="680" y="413" text-anchor="middle" class="h">Pins 6 / 7</text><text x="680" y="439" text-anchor="middle" class="s">GND copper + black pigtails</text>
  <text x="680" y="505" text-anchor="middle" class="s">No pad annulus, plane, trace, via,</text><text x="680" y="530" text-anchor="middle" class="s">solder, wire, splice, or test point</text><text x="680" y="555" text-anchor="middle" class="s">on any DK positive-power contact.</text>
  <line x1="845" y1="235" x2="845" y2="555" class="cut"/>
  <text x="865" y="260" class="red">OPEN</text>

  <rect x="980" y="130" width="355" height="230" rx="18" class="p"/><text x="1158" y="170" text-anchor="middle" class="h">PCB_glove positive-power tree</text>
  <text x="1158" y="210" text-anchor="middle" class="s">External J9 +5V_EXT only</text>
  <text x="1158" y="240" text-anchor="middle" class="s">J9 → F1 → +5V_FUSED → D1</text>
  <text x="1158" y="270" text-anchor="middle" class="s">→ +5V_PROTECTED → JP1 → U2</text>
  <text x="1158" y="300" text-anchor="middle" class="s">→ +3V3_IMU</text>
  <text x="1158" y="334" text-anchor="middle" class="red">No DK positive rail joins this tree.</text>

  <rect x="980" y="430" width="355" height="170" rx="18" class="g"/><text x="1158" y="470" text-anchor="middle" class="h">Only intentional common reference</text>
  <text x="1158" y="510" text-anchor="middle" class="s">CN12-7 GND</text><text x="1158" y="538" text-anchor="middle" class="s">CN8-6 GND</text><text x="1158" y="566" text-anchor="middle" class="s">CN8-7 GND</text>
  <line x1="790" y1="420" x2="980" y2="515" class="line"/>

  <rect x="55" y="730" width="1280" height="58" rx="10" class="r"/>
  <text x="695" y="765" text-anchor="middle" class="red">Continuity acceptance: every DK positive rail is OPEN to all glove positive rails, all 13 signals, all harness cavities, and every test point.</text>
</svg>
