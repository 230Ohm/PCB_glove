<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f8fafc"/>
  <style>.title{font:700 27px Arial;fill:#0f172a}.h{font:700 18px Arial;fill:#0f172a}.t{font:15px Arial;fill:#334155}.small{font:13px Arial;fill:#475569}.board{fill:#64748b;stroke:#334155;stroke-width:2}.support{fill:#22c55e;stroke:#166534;stroke-width:2}.connector{fill:#f59e0b;stroke:#92400e;stroke-width:2}.warn{font:700 18px Arial;fill:#991b1b}.guide{stroke:#2563eb;stroke-width:2;stroke-dasharray:7 6}</style>
  <text x="50" y="48" class="title">Proposal 015F - provisional non-loading three-point support concept</text>
  <text x="65" y="92" class="h">Section: mate connectors first, then set supports to the measured seated plane</text>
  <rect x="100" y="130" width="1000" height="30" class="board"/><text x="115" y="122" class="t">MB1939</text>
  <rect x="235" y="160" width="100" height="205" class="connector"/><rect x="865" y="160" width="100" height="205" class="connector"/>
  <rect x="100" y="365" width="1000" height="30" class="board"/><text x="115" y="430" class="t">PCB_glove interposer</text>
  <rect x="175" y="395" width="48" height="165" class="support"/><rect x="575" y="395" width="48" height="165" class="support"/><rect x="977" y="395" width="48" height="165" class="support"/>
  <line x1="80" y1="560" x2="1120" y2="560" stroke="#0f172a" stroke-width="7"/><text x="85" y="595" class="t">external carrier / fixture datum</text>
  <line x1="160" y1="360" x2="1040" y2="360" class="guide"/><text x="430" y="350" class="t">measured fully seated interposer plane</text>
  <text x="150" y="645" class="h">Support rule</text><text x="150" y="675" class="t">Three adjustable nylon-tipped stops; set 0.05-0.15 mm unloaded clearance after mating, then lock.</text>
  <text x="150" y="705" class="t">No fixed 12.32 mm standoff. No connector preload. No wearable structural load through connector strips.</text>
  <g transform="translate(785,605)"><rect x="0" y="0" width="350" height="120" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="18" y="34" class="warn">MEASUREMENT REQUIRED</text><text x="18" y="64" class="small">Exact stop hardware/MPN and absolute</text><text x="18" y="84" class="small">heights remain blocked until an actual</text><text x="18" y="104" class="small">fully seated assembly is measured.</text></g>
</svg>
